<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <script src="../theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧複習地圖</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&family=Noto+Serif+TC:wght@600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.8;padding:24px}

    nav{position:fixed;top:0;left:0;right:0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;background:var(--bg);z-index:100;border-bottom:1px solid var(--border)}
    nav a,nav button{color:var(--muted);text-decoration:none;font-size:14px;background:none;border:none;cursor:pointer}
    nav a:hover,nav button:hover{color:var(--text)}
    .print-btn{border:1px solid var(--border);border-radius:12px;padding:10px 16px;background:var(--card);color:var(--text)}

    .container{max-width:640px;margin:72px auto 0}
    h1{font-family:'Noto Serif TC',serif;font-size:2.35rem;font-weight:600;letter-spacing:1px;text-align:left;margin-bottom:6px}
    .subtitle{color:var(--muted);font-size:13px;margin-bottom:26px}
    .subtitle-en{color:var(--muted);font-size:13px;margin-top:-6px;margin-bottom:24px;opacity:.9}

    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:12px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
    input{width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text);font:inherit}
    input:focus{outline:none;border-color:var(--accent)}

    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
    .btn{padding:10px 16px;border:1px solid var(--border);border-radius:999px;background:var(--bg);color:var(--text);font:inherit;cursor:pointer}
    .btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}

    #summary{display:none}
    .meta{display:flex;gap:10px;flex-wrap:wrap}
    .pill{font-size:12px;border:1px solid var(--border);border-radius:999px;padding:3px 10px;color:var(--muted)}

    .task{border:1px solid var(--border);border-radius:14px;padding:14px;background:var(--card);margin-bottom:10px}
    .task-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .task-title{font-weight:500}
    .task-date{font-size:13px;color:var(--muted)}
    .task-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .tiny{padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);cursor:pointer}

    .hint{font-size:12px;color:var(--muted);text-align:center;margin-top:12px}

    @media (max-width:640px){
      body{padding:16px}
      nav{padding:12px 16px}
      .container{margin-top:56px}
      .grid{grid-template-columns:1fr}
    }

    @media print {
      nav,.actions,.task-actions,.hint{display:none}
      body{padding:0}
      .container{margin:0;max-width:none}
      .card,.task{break-inside:avoid}
    }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html">← 返回</a>
    <button class="print-btn" onclick="window.print()">列印</button>
  </nav>

  <div class="container">
    <h1>智慧複習地圖</h1>
    <p class="subtitle">輸入考試日＋章節 產生每日任務卡</p>
    <p class="subtitle-en">Smart Review Map</p>

    <div class="card">
      <div class="grid">
        <div class="field">
          <label>考試日期</label>
          <input id="examDate" type="date">
        </div>
        <div class="field">
          <label>科目（可空白）</label>
          <input id="subject" placeholder="例如：化學">
        </div>
      </div>
      <div class="field" style="margin-top:10px">
        <label>章節（逗號分隔）</label>
        <input id="chapters" placeholder="晶場理論, 酸鹼滴定, 氧化還原">
      </div>
      <div class="actions">
        <button class="btn primary" onclick="buildPlan()">產生任務卡</button>
        <button class="btn" onclick="loadDemo()">示範資料</button>
        <button class="btn" onclick="clearAll()">清除</button>
      </div>
    </div>

    <div id="summary" class="card"></div>
    <div id="tasks"></div>
    <p class="hint">資料只存在你的瀏覽器 localStorage</p>
  </div>

  <script>
    const KEY='review-map-mvp-v2';
    const $=id=>document.getElementById(id);

    function daysBetween(today,target){
      const a=new Date(today.getFullYear(),today.getMonth(),today.getDate());
      const b=new Date(target.getFullYear(),target.getMonth(),target.getDate());
      return Math.max(1,Math.ceil((b-a)/86400000));
    }

    function priorityByIndex(i,total){
      const r=(i+1)/total;
      if(r<=0.33) return '高優先';
      if(r<=0.66) return '中優先';
      return '穩固複習';
    }

    function buildPlan(){
      const exam=$('examDate').value;
      const subject=$('subject').value.trim();
      const chapters=$('chapters').value.split(',').map(v=>v.trim()).filter(Boolean);
      if(!exam||chapters.length===0){alert('至少要填考試日期和一個章節');return}

      const today=new Date();
      const target=new Date(exam+'T00:00:00');
      const days=daysBetween(today,target);

      const plan=chapters.map((chapter,i)=>{
        const dayOffset=Math.floor((i*days)/chapters.length);
        const due=new Date(today); due.setDate(today.getDate()+dayOffset);
        return {chapter,due:due.toISOString().slice(0,10),priority:priorityByIndex(i,chapters.length),status:'未開始'}
      });

      const data={exam,subject,chapters,plan,updatedAt:new Date().toISOString()};
      localStorage.setItem(KEY,JSON.stringify(data));
      render(data);
    }

    function render(data){
      $('summary').style.display='block';
      $('summary').innerHTML=`
        <div class="meta">
          <span class="pill">${data.subject||'未命名科目'}</span>
          <span class="pill">考試日 ${data.exam}</span>
          <span class="pill">${data.chapters.length} 個章節</span>
        </div>
      `;

      $('tasks').innerHTML=data.plan.map((t,i)=>`
        <div class="task">
          <div class="task-head">
            <div>
              <div class="task-title">${i+1}. ${t.chapter}</div>
              <div class="task-date">建議日期 ${t.due}</div>
            </div>
            <span class="pill">${t.priority}</span>
          </div>
          <div class="task-actions">
            <button class="tiny" onclick="setStatus(${i},'我會了')">我會了</button>
            <button class="tiny" onclick="setStatus(${i},'還不熟')">還不熟</button>
            <span class="pill">${t.status}</span>
          </div>
        </div>
      `).join('');
    }

    function setStatus(i,s){
      const data=JSON.parse(localStorage.getItem(KEY)||'null');
      if(!data) return;
      data.plan[i].status=s;
      localStorage.setItem(KEY,JSON.stringify(data));
      render(data);
    }

    function loadDemo(){
      $('subject').value='化學';
      $('chapters').value='晶場理論, 化學平衡, 酸鹼滴定, 氧化還原';
      const d=new Date(); d.setDate(d.getDate()+14);
      $('examDate').value=d.toISOString().slice(0,10);
      buildPlan();
    }

    function clearAll(){
      localStorage.removeItem(KEY);
      $('summary').style.display='none';
      $('tasks').innerHTML='';
      $('examDate').value='';
      $('subject').value='';
      $('chapters').value='';
    }

    (function init(){
      const saved=localStorage.getItem(KEY);
      if(saved){
        const data=JSON.parse(saved);
        $('examDate').value=data.exam||'';
        $('subject').value=data.subject||'';
        $('chapters').value=(data.chapters||[]).join(', ');
        render(data);
      }
    })();
  </script>
</body>
</html>
