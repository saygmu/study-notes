<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <script src="../theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📖%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📖%3C/text%3E%3C/svg%3E">
  <meta name="apple-mobile-web-app-title" content="讀書儀表板">
  <title>考試讀書儀表板</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      transition: background 0.3s, color 0.3s;
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg);
      z-index: 100;
    }
    nav a { color: var(--muted); text-decoration: none; font-size: 14px; transition: color 0.2s; }
    nav a:hover { color: var(--text); }
    .nav-right { display: flex; gap: 12px; align-items: center; }
    .nav-right span { color: var(--muted); font-size: 13px; }

    .container {
      max-width: 640px;
      margin: 0 auto;
      padding: 64px 20px 100px;
    }

    h1 {
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 2rem;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 8px;
    }
    .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 40px; text-align: center; }

    .exam-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .exam-row label { font-size: 14px; color: var(--muted); }
    .exam-row input[type="date"] {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }
    .countdown-text { font-size: 14px; font-weight: 500; color: var(--accent); }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }
    .s-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: transform 0.2s;
    }
    .s-card:hover { transform: translateY(-1px); }
    .s-card .s-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .s-card .s-value { font-family: 'Noto Serif TC', serif; font-size: 1.6rem; font-weight: 600; }
    .s-card .s-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .s-card.total { grid-column: 1 / -1; text-align: center; }
    .s-card.total .s-value { font-size: 2rem; color: var(--accent); }
    .prog-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-top: 10px; overflow: hidden; }
    .prog-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.5s ease; }

    .tabs { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
    .tab {
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      font-weight: 400;
      transition: all 0.2s;
    }
    .tab:hover { border-color: var(--text); color: var(--text); }
    .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .stats-row {
      display: flex; gap: 16px; margin-bottom: 24px;
      padding-bottom: 24px; border-bottom: 1px solid var(--border);
    }
    .stat-item { text-align: center; flex: 1; }
    .stat-num { font-family: 'Noto Serif TC', serif; font-size: 1.3rem; font-weight: 600; }
    .stat-label { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .chart-section { margin-bottom: 24px; }
    .chart-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 16px; }
    .bar-chart { display: flex; gap: 4px; overflow-x: auto; }
    .bar-col { flex: 1; min-width: 28px; display: flex; flex-direction: column; align-items: center; }
    .bar-area { height: 110px; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .bar-val { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
    .bar { width: 70%; max-width: 32px; border-radius: 3px 3px 0 0; min-height: 2px; background: var(--accent); opacity: 0.6; transition: height 0.5s ease; }
    .bar-lbl { font-size: 8px; color: var(--muted); text-align: center; margin-top: 6px; line-height: 1.15; height: 26px; overflow: hidden; word-break: break-all; }

    .section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; margin-top: 28px; }

    .chapter { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .ch-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.15s; user-select: none; }
    .ch-header:hover { opacity: 0.8; }
    .ch-header h3 { font-size: 14px; font-weight: 400; display: flex; align-items: center; gap: 8px; }
    .ch-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--muted); }
    .ch-arrow { color: var(--muted); font-size: 14px; transition: transform 0.2s; }
    .ch-header.open .ch-arrow { transform: rotate(180deg); }
    .ch-body { padding: 0 16px 14px; }
    .ch-body.collapsed { display: none; }

    .topic { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .topic:last-child { border-bottom: none; }
    .check { width: 18px; height: 18px; border: 1.5px solid var(--border); border-radius: 4px; cursor: pointer; flex-shrink: 0; transition: all 0.2s; display: flex; align-items: center; justify-content: center; background: transparent; }
    .check:hover { border-color: var(--accent); }
    .check.done { background: var(--accent); border-color: var(--accent); }
    .check.done::after { content: '✓'; color: var(--bg); font-size: 11px; font-weight: 700; }
    .t-info { flex: 1; min-width: 0; }
    .t-name { font-size: 14px; font-weight: 400; }
    .t-name.done { text-decoration: line-through; color: var(--muted); }
    .t-detail { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .conf-btns { display: flex; gap: 4px; }
    .conf { width: 26px; height: 26px; border: 1px solid var(--border); border-radius: 6px; background: transparent; cursor: pointer; font-size: 12px; transition: all 0.15s; display: flex; align-items: center; justify-content: center; }
    .conf:hover { border-color: var(--accent); }
    .conf.c1 { border-color: var(--accent); background: var(--highlight); }
    .conf.c2 { border-color: var(--accent); opacity: 0.7; background: var(--highlight); }
    .conf.c3 { border-color: var(--accent); background: var(--accent); color: var(--bg); }

    .weak-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 14px; border-bottom: 1px solid var(--border); }
    .weak-item:last-child { border-bottom: none; }
    .weak-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
    .weak-sub { font-size: 12px; color: var(--muted); }

    .plan-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }
    .plan-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .plan-card h4 { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    .plan-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; }
    .plan-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .actions { text-align: center; margin-top: 32px; padding-top: 32px; border-top: 1px solid var(--border); }
    .reset-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; }
    .reset-btn:hover { border-color: var(--text); color: var(--text); }

    .sync-section { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); }
    .sync-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; text-align: center; }
    .sync-row { display: flex; gap: 8px; margin-bottom: 12px; justify-content: center; align-items: center; }
    .sync-pin { width: 140px; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 12px; border-radius: 8px; font-size: 16px; font-family: monospace; text-align: center; letter-spacing: 4px; }
    .sync-pin::placeholder { letter-spacing: 1px; font-size: 13px; }
    .sync-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
    .sync-btn:hover { border-color: var(--accent); color: var(--accent); }
    .sync-btn.primary { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    .sync-btn.primary:hover { opacity: 0.85; }
    .sync-msg { font-size: 12px; color: var(--accent); text-align: center; min-height: 18px; margin-top: 4px; }

    @media (max-width: 480px) {
      .container { padding: 56px 14px 80px; }
      h1 { font-size: 1.5rem; }
      .summary-grid { gap: 8px; }
      .s-card { padding: 12px; }
      .s-card .s-value { font-size: 1.3rem; }
      .tabs { gap: 6px; }
      .tab { padding: 6px 14px; font-size: 12px; }
      .stats-row { gap: 8px; }
      .stat-num { font-size: 1.1rem; }
      .bar-area { height: 90px; }
      .plan-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav>
  <a href="../">← 返回</a>
  <div class="nav-right"><span id="navCountdown"></span></div>
</nav>

<div class="container">
  <h1>讀書儀表板</h1>
  <p class="subtitle">選修物理 IV & V ｜ 選修化學（有機化合物 & 有機聚合物）</p>

  <div class="exam-row">
    <label>考試日期</label>
    <input type="date" id="examDate" />
    <span class="countdown-text" id="countdown"></span>
  </div>

  <div class="summary-grid" id="summaryCards"></div>
  <div class="tabs" id="tabBar"></div>
  <div id="tab-overview" class="tab-content active"></div>
  <div id="tab-physics" class="tab-content"></div>
  <div id="tab-chem" class="tab-content"></div>
  <div id="tab-planner" class="tab-content"></div>
  <div class="actions">
    <div class="sync-section">
      <div class="sync-title">跨裝置同步</div>
      <div class="sync-row">
        <input type="text" class="sync-pin" id="syncPin" maxlength="4" placeholder="4碼 PIN" inputmode="numeric" />
      </div>
      <div class="sync-row">
        <button class="sync-btn primary" onclick="syncUpload()">上傳進度</button>
        <button class="sync-btn" onclick="syncDownload()">下載進度</button>
      </div>
      <div class="sync-msg" id="syncMsg"></div>
    </div>
    <button class="reset-btn" onclick="resetAll()" style="margin-top:20px;">重設所有進度</button>
  </div>
</div>

<script>
const subjects={physics:{name:'選修物理',color:'physics',chapters:[{title:'IV 第3章：電磁感應（3-3起）',topics:[{id:'p1',name:'3-3 法拉第定律',detail:'法拉第電磁感應定律、應用'},{id:'p2',name:'3-4 電磁感應現象的應用',detail:'發電機、變壓器、電磁煞車'},{id:'p3',name:'3-5 電磁波',detail:'電磁波的產生、性質與頻譜'},{id:'p4',name:'補充：渦電流',detail:'渦電流原理與應用'}]},{title:'V 第1章：電路',topics:[{id:'p5',name:'1-1 電流和電動勢',detail:'電流定義、電動勢、內電阻'},{id:'p6',name:'1-2 電阻和歐姆定律',detail:'電阻、歐姆定律、電阻率'},{id:'p7',name:'1-3 電流的熱效應與電功率',detail:'焦耳熱、電功率計算'}]},{title:'V 第2章：量子現象（到2-4）',topics:[{id:'p8',name:'2-1 電子的發現',detail:'陰極射線、湯姆森實驗、密立坎油滴實驗'},{id:'p9',name:'2-2 X射線',detail:'X射線的產生、性質與應用'},{id:'p10',name:'2-3 黑體輻射—能量的不連續性',detail:'黑體輻射、普朗克量子假說'},{id:'p11',name:'2-4 光電效應',detail:'光電效應實驗、愛因斯坦光量子論'}]}]},chem:{name:'選修化學',color:'chem',chapters:[{title:'第1章：有機化合物（1-5起）',topics:[{id:'c1',name:'1-5 烴（III）芳香烴',detail:'苯的結構與性質、取代反應'},{id:'c2',name:'1-6 官能基與有機鹵化烴',detail:'官能基分類、鹵化烴性質與反應'},{id:'c3',name:'1-7 醇、醚與酚',detail:'醇的分類與反應、醚、酚的性質'},{id:'c4',name:'1-8 醛與酮',detail:'醛酮的結構、性質與鑑別'},{id:'c5',name:'1-9 羧酸與酯',detail:'羧酸性質、酯化反應、皂化'},{id:'c6',name:'1-10 胺與醯胺',detail:'胺的分類與鹼性、醯胺鍵'}]},{title:'第2章：有機聚合物',topics:[{id:'c7',name:'2-1 聚合物的分類與性質',detail:'加成聚合、縮合聚合、熱塑性與熱固性'},{id:'c8',name:'2-2 天然聚合物',detail:'醣類、蛋白質、核酸'},{id:'c9',name:'2-3 人工合成聚合物',detail:'塑膠、合成纖維、合成橡膠'}]}]}};

const STORAGE_KEY='studyDashboard-114-2-3';
let state=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
if(!state.checked)state.checked={};if(!state.confidence)state.confidence={};if(!state.examDate)state.examDate='2026-04-27';
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));autoSync();}
function allTopics(k){return subjects[k].chapters.flatMap(c=>c.topics);}
function checkedN(k){return allTopics(k).filter(t=>state.checked[t.id]).length;}
function totalN(k){return allTopics(k).length;}
function pct(k){const t=totalN(k);return t?Math.round(checkedN(k)/t*100):0;}
function overallPct(){let c=0,t=0;for(const k of Object.keys(subjects)){c+=checkedN(k);t+=totalN(k);}return t?Math.round(c/t*100):0;}

const tabDefs=[{id:'overview',label:'總覽'},{id:'physics',label:'物理'},{id:'chem',label:'化學'},{id:'planner',label:'計畫'}];
function renderTabs(){document.getElementById('tabBar').innerHTML=tabDefs.map(t=>`<button class="tab ${t.id==='overview'?'active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`).join('');}
function switchTab(name){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));event.target.classList.add('active');document.getElementById('tab-'+name).classList.add('active');renderAll();}

function renderSummary(){const el=document.getElementById('summaryCards');let h='';for(const[k,s]of Object.entries(subjects)){const p=pct(k);h+=`<div class="s-card"><div class="s-label">${s.name}</div><div class="s-value">${p}%</div><div class="s-sub">${checkedN(k)} / ${totalN(k)}</div><div class="prog-bar"><div class="prog-fill" style="width:${p}%"></div></div></div>`;}h+=`<div class="s-card total"><div class="s-label">總進度</div><div class="s-value">${overallPct()}%</div></div>`;el.innerHTML=h;}

function renderSubject(k){const s=subjects[k];const el=document.getElementById('tab-'+k);let h='';for(const ch of s.chapters){const dn=ch.topics.filter(t=>state.checked[t.id]).length;h+=`<div class="chapter"><div class="ch-header open" onclick="togSec(this)"><h3><span class="ch-badge">${dn}/${ch.topics.length}</span>${ch.title}</h3><span class="ch-arrow">▾</span></div><div class="ch-body">`;for(const t of ch.topics){const ck=state.checked[t.id];const cf=state.confidence[t.id]||0;h+=`<div class="topic"><div class="check ${ck?'done':''}" onclick="togCheck('${t.id}')"></div><div class="t-info"><div class="t-name ${ck?'done':''}">${t.name}</div><div class="t-detail">${t.detail}</div></div><div class="conf-btns"><button class="conf ${cf===1?'c1':''}" onclick="setConf('${t.id}',1)">!</button><button class="conf ${cf===2?'c2':''}" onclick="setConf('${t.id}',2)">~</button><button class="conf ${cf===3?'c3':''}" onclick="setConf('${t.id}',3)">✓</button></div></div>`;}h+='</div></div>';}el.innerHTML=h;}

function renderOverview(){const el=document.getElementById('tab-overview');let tt=0,td=0,tw=0,ts=0;for(const k of Object.keys(subjects))for(const c of subjects[k].chapters)for(const t of c.topics){tt++;if(state.checked[t.id])td++;if(state.confidence[t.id]===1)tw++;if(state.confidence[t.id]===3)ts++;}
let h=`<div class="stats-row"><div class="stat-item"><div class="stat-num">${tt}</div><div class="stat-label">總主題</div></div><div class="stat-item"><div class="stat-num">${td}</div><div class="stat-label">已完成</div></div><div class="stat-item"><div class="stat-num">${tw}</div><div class="stat-label">不熟</div></div><div class="stat-item"><div class="stat-num">${ts}</div><div class="stat-label">熟練</div></div><div class="stat-item"><div class="stat-num">${tt-td}</div><div class="stat-label">待完成</div></div></div>`;
h+='<div class="chart-section"><div class="chart-title">各章節完成度</div><div class="bar-chart">';for(const[k,s]of Object.entries(subjects))for(const c of s.chapters){const d=c.topics.filter(t=>state.checked[t.id]).length,t=c.topics.length,p=t?Math.round(d/t*100):0,nm=c.title.replace(/[：:]/g,'\n').split('\n')[0].replace(/（.*?）/,'').trim().slice(0,6);h+=`<div class="bar-col"><div class="bar-area"><div class="bar-val">${p}%</div><div class="bar" style="height:${Math.max(p*1,2)}px"></div></div><div class="bar-lbl">${nm}</div></div>`;}h+='</div></div>';
const weak=[];for(const[k,s]of Object.entries(subjects))for(const c of s.chapters)for(const t of c.topics)if(state.confidence[t.id]===1)weak.push({...t,subj:s.name});
if(weak.length){h+='<div class="section-title">需加強</div>';for(const w of weak)h+=`<div class="weak-item"><span class="weak-dot"></span><div><div>${w.name}</div><div class="weak-sub">${w.subj}</div></div></div>`;}el.innerHTML=h;}

function renderPlanner(){const el=document.getElementById('tab-planner');const rem=[];for(const[k,s]of Object.entries(subjects))for(const c of s.chapters)for(const t of c.topics)if(!state.checked[t.id])rem.push({...t,sn:s.name});rem.sort((a,b)=>{const ca=state.confidence[a.id]||0,cb=state.confidence[b.id]||0;return(ca===1&&cb!==1)?-1:(cb===1&&ca!==1)?1:0;});if(!rem.length){el.innerHTML='<div style="text-align:center;padding:40px;color:var(--muted)">全部完成！</div>';return;}let days=14;if(state.examDate){const d=Math.ceil((new Date(state.examDate)-new Date())/864e5);if(d>0)days=d;}const per=Math.ceil(rem.length/Math.min(days,rem.length));let h=`<div class="section-title">${rem.length} 個主題・${days} 天・每天 ${per} 個</div><div class="plan-grid">`;let dn=1;for(let i=0;i<rem.length;i+=per){const dt=rem.slice(i,i+per);const td=new Date();td.setDate(td.getDate()+dn-1);h+=`<div class="plan-card"><h4>Day ${dn}（${td.getMonth()+1}/${td.getDate()}）</h4>`;for(const t of dt)h+=`<div class="plan-item"><span class="plan-dot"></span>${t.name}</div>`;h+='</div>';dn++;}h+='</div>';el.innerHTML=h;}

function togCheck(id){state.checked[id]=!state.checked[id];saveState();renderAll();}
function setConf(id,l){state.confidence[id]=state.confidence[id]===l?0:l;saveState();renderAll();}
function togSec(el){el.classList.toggle('open');el.nextElementSibling.classList.toggle('collapsed');}
function resetAll(){if(confirm('確定重設？')){state.checked={};state.confidence={};saveState();renderAll();}}

function updateCountdown(){const el=document.getElementById('countdown'),nav=document.getElementById('navCountdown');if(!state.examDate){el.textContent='';nav.textContent='';return;}document.getElementById('examDate').value=state.examDate;const d=Math.ceil((new Date(state.examDate)-new Date())/864e5);if(d>0){el.textContent=`還剩 ${d} 天`;nav.textContent=`D-${d}`;}else if(d===0){el.textContent='今天考試';nav.textContent='TODAY';}else{el.textContent='已結束';nav.textContent='';}}
document.getElementById('examDate').addEventListener('change',e=>{state.examDate=e.target.value;saveState();updateCountdown();renderPlanner();});

const SYNC_API='https://dashboard-sync.saygmulovesgreen.workers.dev';
function getPin(){const p=document.getElementById('syncPin').value.trim();if(p.length<4){document.getElementById('syncMsg').textContent='請輸入 4 碼 PIN';return null;}return p;}

async function syncUpload(){
  const pin=getPin();if(!pin)return;
  const msg=document.getElementById('syncMsg');
  msg.textContent='上傳中…';
  try{
    const res=await fetch(SYNC_API+'/sync',{method:'POST',headers:{'Content-Type':'application/json','X-Pin':pin},body:JSON.stringify(state)});
    const data=await res.json();
    if(data.ok){msg.textContent='上傳成功！在另一台裝置輸入同樣的 PIN 按「下載進度」';localStorage.setItem('dashSyncPin',pin);}
    else msg.textContent='上傳失敗：'+(data.error||'未知錯誤');
  }catch(e){msg.textContent='連線失敗，請稍後再試';}
}

async function syncDownload(){
  const pin=getPin();if(!pin)return;
  const msg=document.getElementById('syncMsg');
  msg.textContent='下載中…';
  try{
    const res=await fetch(SYNC_API+'/sync',{headers:{'X-Pin':pin}});
    const data=await res.json();
    if(data.found){
      const imported=data.data;
      if(imported.checked)state.checked=imported.checked;
      if(imported.confidence)state.confidence=imported.confidence;
      if(imported.examDate)state.examDate=imported.examDate;
      saveState();renderAll();
      localStorage.setItem('dashSyncPin',pin);
      msg.textContent='下載成功！進度已同步';
    }else{msg.textContent='找不到這組 PIN 的資料，請先在另一台裝置上傳';}
  }catch(e){msg.textContent='連線失敗，請稍後再試';}
}

let _syncTimer=null;
function autoSync(){
  const pin=localStorage.getItem('dashSyncPin');
  if(!pin)return;
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(async()=>{
    try{
      await fetch(SYNC_API+'/sync',{method:'POST',headers:{'Content-Type':'application/json','X-Pin':pin},body:JSON.stringify(state)});
      document.getElementById('syncMsg').textContent='已自動同步 '+new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
    }catch(e){}
  },800);
}

async function autoLoad(){
  const pin=localStorage.getItem('dashSyncPin');
  if(!pin)return;
  document.getElementById('syncPin').value=pin;
  try{
    const res=await fetch(SYNC_API+'/sync',{headers:{'X-Pin':pin}});
    const data=await res.json();
    if(data.found){
      const remote=data.data;
      const localCount=Object.keys(state.checked).filter(k=>state.checked[k]).length;
      const remoteCount=Object.keys(remote.checked||{}).filter(k=>remote.checked[k]).length;
      if(remoteCount>localCount){
        if(remote.checked)state.checked=remote.checked;
        if(remote.confidence)state.confidence=remote.confidence;
        if(remote.examDate)state.examDate=remote.examDate;
        localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
        renderAll();
        document.getElementById('syncMsg').textContent='已從雲端同步最新進度';
      }else{
        document.getElementById('syncMsg').textContent='本地進度是最新的';
      }
    }
  }catch(e){}
}

(function restorePin(){const p=localStorage.getItem('dashSyncPin');if(p)document.getElementById('syncPin').value=p;})();

function renderAll(){renderSummary();renderOverview();renderSubject('physics');renderSubject('chem');renderPlanner();updateCountdown();}
renderTabs();renderAll();autoLoad();
</script>
</body>
</html>
