<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <script src="../theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智慧複習地圖</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      font-size: 14px;
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--text); }

    .nav-actions button {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      transition: color 0.2s;
    }

    .nav-actions button:hover { color: var(--text); }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    h1 {
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 2.5rem;
      margin: 40px 0 16px;
      letter-spacing: 2px;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 40px;
      font-size: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .input-group label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-group input {
      width: 100%;
      height: 46px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 16px;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s;
      box-sizing: border-box;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--text);
    }

    .input-group input[type="date"] {
      min-height: 46px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .actions .btn {
      width: 112px;
    }

    .btn {
      width: 112px;
      height: 40px;
      padding: 10px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      line-height: 1;
      transition: opacity 0.2s;
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      white-space: nowrap;
    }

    .btn.primary {
      background: var(--text);
      color: var(--bg);
      border: none;
    }

    .btn:hover { opacity: 0.8; }

    #summary { display: none; }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 12px;
      color: var(--muted);
    }

    .task {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .task-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
    }

    .task-title {
      font-weight: 500;
      margin-bottom: 2px;
    }

    .task-date {
      color: var(--muted);
      font-size: 14px;
    }

    .task-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 12px;
    }

    .tiny-btn {
      min-width: 82px;
      height: 34px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-family: inherit;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    body.mobile .card { padding: 16px; }
    body.mobile .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    body.mobile .actions .btn {
      width: 100%;
      height: 42px;
      white-space: nowrap;
    }

    @media (max-width: 768px) {
      .container { padding: 56px 16px 24px; }
      h1 { font-size: 2rem; margin-top: 28px; }
    }

    @media print {
      nav, .actions, .task-actions, .hint { display: none; }
      .container { padding: 0; max-width: none; }
      .card, .task { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="../index.html">← 返回</a>
    <div class="nav-actions">
      <button onclick="window.print()">列印</button>
    </div>
  </nav>

  <div class="container">
    <h1>智慧複習地圖</h1>
    <p class="subtitle">輸入考試日期與章節，自動生成每日任務卡</p>

    <div class="card">
      <div class="form-grid">
        <div class="input-group">
          <label>考試日期</label>
          <input id="examDate" type="date">
        </div>
        <div class="input-group">
          <label>科目</label>
          <input id="subject" placeholder="例如：化學">
        </div>
      </div>

      <div class="input-group" style="margin-bottom: 8px;">
        <label>章節（逗號分隔）</label>
        <input id="chapters" placeholder="晶場理論, 酸鹼滴定, 氧化還原">
      </div>

      <div class="actions">
        <button class="btn primary" onclick="buildPlan()">產生任務卡</button>
        <button class="btn" onclick="loadDemo()">示範資料</button>
        <button class="btn" onclick="clearAll()">清除</button>
      </div>
    </div>

    <div id="summary" class="card"></div>
    <div id="tasks"></div>
    <p class="hint">資料會儲存在你的瀏覽器（localStorage）</p>
  </div>

  <script>
    const KEY = 'review-map-mvp-v3';
    const $ = id => document.getElementById(id);

    function daysBetween(today, target) {
      const a = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const b = new Date(target.getFullYear(), target.getMonth(), target.getDate());
      return Math.max(1, Math.ceil((b - a) / 86400000));
    }

    function priorityByIndex(i, total) {
      const r = (i + 1) / total;
      if (r <= 0.33) return '高優先';
      if (r <= 0.66) return '中優先';
      return '穩固複習';
    }

    function buildPlan() {
      const exam = $('examDate').value;
      const subject = $('subject').value.trim();
      const chapters = $('chapters').value.split(',').map(v => v.trim()).filter(Boolean);
      if (!exam || chapters.length === 0) {
        alert('至少要填考試日期和一個章節');
        return;
      }

      const today = new Date();
      const target = new Date(exam + 'T00:00:00');
      const days = daysBetween(today, target);

      const plan = chapters.map((chapter, i) => {
        const dayOffset = Math.floor((i * days) / chapters.length);
        const due = new Date(today);
        due.setDate(today.getDate() + dayOffset);
        return {
          chapter,
          due: due.toISOString().slice(0, 10),
          priority: priorityByIndex(i, chapters.length),
          status: '未開始'
        };
      });

      const data = { exam, subject, chapters, plan, updatedAt: new Date().toISOString() };
      localStorage.setItem(KEY, JSON.stringify(data));
      render(data);
    }

    function render(data) {
      $('summary').style.display = 'block';
      $('summary').innerHTML = `
        <div class="meta">
          <span class="pill">${data.subject || '未命名科目'}</span>
          <span class="pill">考試日 ${data.exam}</span>
          <span class="pill">${data.chapters.length} 個章節</span>
        </div>
      `;

      $('tasks').innerHTML = data.plan.map((t, i) => `
        <div class="task">
          <div class="task-head">
            <div>
              <div class="task-title">${i + 1}. ${t.chapter}</div>
              <div class="task-date">建議日期 ${t.due}</div>
            </div>
            <span class="pill">${t.priority}</span>
          </div>
          <div class="task-actions">
            <button class="tiny-btn" onclick="setStatus(${i}, '我會了')">我會了</button>
            <button class="tiny-btn" onclick="setStatus(${i}, '還不熟')">還不熟</button>
            <span class="pill">${t.status}</span>
          </div>
        </div>
      `).join('');
    }

    function setStatus(i, s) {
      const data = JSON.parse(localStorage.getItem(KEY) || 'null');
      if (!data) return;
      data.plan[i].status = s;
      localStorage.setItem(KEY, JSON.stringify(data));
      render(data);
    }

    function loadDemo() {
      $('subject').value = '化學';
      $('chapters').value = '晶場理論, 化學平衡, 酸鹼滴定, 氧化還原';
      const d = new Date();
      d.setDate(d.getDate() + 14);
      $('examDate').value = d.toISOString().slice(0, 10);
      buildPlan();
    }

    function clearAll() {
      localStorage.removeItem(KEY);
      $('summary').style.display = 'none';
      $('tasks').innerHTML = '';
      $('examDate').value = '';
      $('subject').value = '';
      $('chapters').value = '';
    }

    function applyMobileLayout() {
      document.body.classList.toggle('mobile', window.innerWidth <= 768);
    }

    (function init() {
      applyMobileLayout();
      window.addEventListener('resize', applyMobileLayout);
      const saved = localStorage.getItem(KEY);
      if (saved) {
        const data = JSON.parse(saved);
        $('examDate').value = data.exam || '';
        $('subject').value = data.subject || '';
        $('chapters').value = (data.chapters || []).join(', ');
        render(data);
      }
    })();
  </script>
</body>
</html>
