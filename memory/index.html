<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <script src="../theme.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>秘書的記憶</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      min-height: 100vh;
    }

    /* Lock Screen */
    #lock-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    #lock-screen h1 { font-size: 3rem; margin-bottom: 8px; }
    #lock-screen p { color: var(--muted); margin-bottom: 24px; }
    #lock-screen input {
      width: 200px;
      padding: 12px 16px;
      font-size: 1.25rem;
      text-align: center;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      color: var(--text);
      letter-spacing: 8px;
      margin-bottom: 16px;
    }
    #lock-screen input:focus { outline: none; border-color: var(--accent); }
    #lock-screen button {
      padding: 12px 32px;
      font-size: 1rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    #lock-screen .error { color: #ef4444; margin-top: 16px; }

    /* Main Content */
    #main-content {
      display: none;
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1.5rem;
    }
    .header-buttons { display: flex; gap: 8px; }
    .header-buttons a, .header-buttons button {
      padding: 8px 16px;
      font-size: 0.875rem;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      text-decoration: none;
    }

    .file-list {
      display: grid;
      gap: 8px;
      margin-bottom: 24px;
    }
    .file-item {
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .file-item:hover { border-color: var(--accent); }
    .file-item.active { border-color: var(--accent); background: var(--bg); }
    .file-name { font-weight: 400; }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin: 24px 0 12px;
    }

    /* Daily Navigator */
    .daily-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .daily-nav-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s, opacity 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .daily-nav-btn:hover:not(:disabled) { border-color: var(--accent); }
    .daily-nav-btn:disabled { opacity: 0.3; cursor: default; }
    .daily-nav-title {
      font-family: 'Noto Serif TC', serif;
      font-weight: 600;
      font-size: 1.1rem;
      text-align: center;
      flex: 1;
      min-width: 0;
    }
    .daily-nav-sub {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: 'Noto Sans TC', sans-serif;
      font-weight: 300;
    }

    #file-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      white-space: pre-wrap;
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 13px;
      line-height: 1.6;
      overflow-x: auto;
      display: none;
    }

    .last-sync {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400&family=Noto+Serif+TC:wght@600&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Lock Screen -->
  <div id="lock-screen">
    <h1>🔐</h1>
    <p>輸入密碼查看秘書的記憶</p>
    <input type="password" id="password-input" placeholder="••••" maxlength="10" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
    <button onclick="unlock()">進入</button>
    <p class="error" id="error-msg" style="display:none">密碼錯誤</p>
  </div>

  <!-- Main Content -->
  <div id="main-content">
    <header>
      <h1>秘書的記憶</h1>
      <div class="header-buttons">
        <a href="../">← 返回</a>
        <button onclick="logout()">登出</button>
      </div>
    </header>

    <div class="section-title">📁 核心檔案</div>
    <div class="file-list" id="core-files"></div>

    <div class="section-title">📋 其他</div>
    <div class="file-list" id="other-files"></div>

    <div class="section-title">📅 每日筆記</div>
    <div class="daily-nav" id="daily-nav" style="display:none">
      <button class="daily-nav-btn" id="btn-prev" onclick="navDaily(-1)">‹</button>
      <div style="text-align:center">
        <div class="daily-nav-title" id="daily-title"></div>
        <div class="daily-nav-sub" id="daily-sub"></div>
      </div>
      <button class="daily-nav-btn" id="btn-next" onclick="navDaily(1)">›</button>
    </div>

    <div id="file-content"></div>

    <p class="last-sync">最後同步：<span id="last-sync">-</span></p>
  </div>

  <script>
    function hash(str) {
      let h = 0;
      for (let i = 0; i < str.length; i++) {
        h = ((h << 5) - h) + str.charCodeAt(i);
        h |= 0;
      }
      return h.toString();
    }

    const PASS_HASH = hash('0828');
    const STORAGE_KEY = 'memory_auth';
    const BASE_URL = './raw/';

    const CORE_FILES = ['MEMORY.md', 'AGENTS.md', 'TOOLS.md'];
    const OTHER_FILES = ['troubleshooting-log.md', 'item-locations.md', 'openclaw-update-log.md'];
    const DAILY_FILES = [
      '2026-03-20.md', '2026-03-18.md', '2026-03-17.md', '2026-03-16.md', '2026-03-13.md', '2026-03-12.md', '2026-03-11.md', '2026-03-10.md', '2026-03-10-connection-test.md', '2026-03-09.md', '2026-03-08.md', '2026-03-07.md', '2026-03-06.md', '2026-03-05.md', '2026-03-04.md', '2026-03-03.md', '2026-02-28.md', '2026-02-27.md', '2026-02-24.md', '2026-02-23.md', '2026-02-21.md', '2026-02-19.md', '2026-02-14.md', '2026-02-12.md', '2026-02-08.md', '2026-01-31.md', '2025-02-19.md'
    ];

    let dailyIndex = 0;
    let currentMode = null; // 'core', 'other', 'daily'

    function init() {
      if (localStorage.getItem(STORAGE_KEY) === PASS_HASH) {
        showContent();
      }
      const pwInput = document.getElementById('password-input');
      if (pwInput) {
        pwInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') unlock();
        });
      }
      document.addEventListener('keydown', (e) => {
        if (currentMode !== 'daily') return;
        if (e.key === 'ArrowLeft') navDaily(-1);
        if (e.key === 'ArrowRight') navDaily(1);
      });
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

    // Swipe support
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', (e) => {
      if (currentMode !== 'daily') return;
      const diff = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(diff) > 60) {
        navDaily(diff > 0 ? 1 : -1); // swipe right = older, swipe left = newer
      }
    }, { passive: true });

    function unlock() {
      const input = document.getElementById('password-input').value;
      if (hash(input) === PASS_HASH) {
        localStorage.setItem(STORAGE_KEY, PASS_HASH);
        showContent();
      } else {
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('password-input').value = '';
      }
    }

    function logout() {
      localStorage.removeItem(STORAGE_KEY);
      location.reload();
    }

    function showContent() {
      document.getElementById('lock-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      renderFileList();
      document.getElementById('last-sync').textContent = new Date().toLocaleString('zh-TW');
    }

    function renderFileList() {
      const coreContainer = document.getElementById('core-files');
      const otherContainer = document.getElementById('other-files');

      coreContainer.innerHTML = CORE_FILES.map(f => `
        <div class="file-item" onclick="loadCoreFile('${f}', this)">
          <span class="file-name">${f}</span>
        </div>
      `).join('');

      otherContainer.innerHTML = OTHER_FILES.map(f => `
        <div class="file-item" onclick="loadCoreFile('${f}', this)">
          <span class="file-name">${f.replace('.md', '')}</span>
        </div>
      `).join('');

      // Show latest daily note by default
      showDailyNav();
      loadDailyByIndex(0);
    }

    function loadCoreFile(filename, el) {
      currentMode = 'core';
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));
      if (el) el.classList.add('active');
      document.getElementById('daily-nav').style.display = 'none';
      loadFileContent(filename);
    }

    function showDailyNav() {
      document.getElementById('daily-nav').style.display = 'flex';
    }

    function navDaily(dir) {
      // dir: -1 = newer (left), +1 = older (right)
      const newIndex = dailyIndex + dir;
      if (newIndex < 0 || newIndex >= DAILY_FILES.length) return;
      loadDailyByIndex(newIndex);
    }

    function loadDailyByIndex(idx) {
      dailyIndex = idx;
      currentMode = 'daily';
      document.querySelectorAll('.file-item').forEach(i => i.classList.remove('active'));

      const file = DAILY_FILES[idx];
      const name = file.replace('.md', '');

      document.getElementById('daily-nav').style.display = 'flex';
      document.getElementById('daily-title').textContent = name;
      document.getElementById('daily-sub').textContent = `${idx + 1} / ${DAILY_FILES.length}`;

      document.getElementById('btn-prev').disabled = (idx <= 0);
      document.getElementById('btn-next').disabled = (idx >= DAILY_FILES.length - 1);

      loadFileContent(file);
    }

    async function loadFileContent(filename) {
      const contentEl = document.getElementById('file-content');
      contentEl.style.display = 'block';
      contentEl.textContent = '載入中...';

      try {
        const res = await fetch(BASE_URL + filename + '?t=' + Date.now());
        if (!res.ok) throw new Error('找不到檔案');
        const text = await res.text();
        contentEl.textContent = text;
        contentEl.scrollTop = 0;
      } catch (e) {
        contentEl.textContent = '❌ ' + e.message;
      }
    }
  </script>
</body>
</html>
