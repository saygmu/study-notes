<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>個申戰情室</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box }
:root {
  --bg: #fefefe;
  --text: #2d2d2d;
  --muted: #888;
  --accent: #2d2d2d;
  --border: #e8e8e8;
  --card: #f9f9f9;
  --success: #22c55e;
}
body { background:var(--bg); color:var(--text); font-family:'Noto Sans TC',sans-serif; font-weight:300; line-height:1.8; overflow-x:hidden }
.container { max-width: 720px; margin:0 auto; padding:40px 24px 80px }

nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
}
nav a { color: var(--muted); text-decoration: none; font-size: 14px; }
nav a:hover { color: var(--text); }

header { padding: 48px 0 36px; }
h1 { font-family:'Noto Serif TC',serif; font-size: 2.2rem; font-weight:600; margin-bottom: 8px; letter-spacing: 1px; }
.subtitle { color: var(--muted); font-size: 14px; margin-bottom: 48px; }

.stats-bar { display:flex; gap:24px; margin-bottom: 48px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
.stat { flex:1; text-align:left; }
.stat-num { font-family:'JetBrains Mono',monospace; font-size: 1.5rem; font-weight:700; color:var(--text); }
.stat-label { font-size: 11px; color:var(--muted); text-transform: uppercase; letter-spacing: 1px; }

.filter-bar { display:flex; gap:8px; margin-bottom:32px; flex-wrap:wrap; }
.filter-btn { padding:6px 14px; border:1px solid var(--border); border-radius:6px; background:transparent; color:var(--muted); font-size:13px; cursor:pointer; transition:all .2s; }
.filter-btn:hover { border-color:var(--text); color:var(--text); }
.filter-btn.active { background:var(--text); border-color:var(--text); color:var(--bg); }

.schools-grid { display:grid; grid-template-columns:1fr; gap:16px; }
.school-card { background:var(--bg); border:1px solid var(--border); border-radius:12px; overflow:hidden; transition:all .3s; position:relative; }
.school-card:hover { border-color:var(--muted); }
.card-header { padding:20px 24px; display:flex; align-items:center; justify-content:space-between; cursor:pointer; }
.card-header-left { display:flex; align-items:center; gap:16px; }
.school-icon { width:40px; height:40px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; font-weight:700; color:#fff; flex-shrink:0; }
.school-name { font-family:'Noto Serif TC',serif; font-size:1.1rem; font-weight:600; }
.school-dept { font-size:12px; color:var(--muted); margin-top:2px; }
.expand-icon { color:var(--muted); font-size:12px; transition:transform .3s; }
.school-card[data-expanded="true"] .expand-icon { transform:rotate(180deg) }

.tag-row { padding:0 24px 16px; display:flex; gap:8px; flex-wrap:wrap; }
.tag { padding:2px 8px; border-radius:4px; font-size:11px; font-weight:400; border:1px solid var(--border); color:var(--muted); }

.progress-row { padding:0 24px 20px; display:flex; align-items:center; gap:12px; }
.progress-track { flex:1; height:2px; background:var(--border); overflow:hidden; }
.progress-fill { height:100%; background:var(--text); transition:width .5s; }
.progress-text { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); }

.card-detail { max-height:0; overflow:hidden; transition:max-height .5s cubic-bezier(.4,0,.2,1); }
.school-card[data-expanded="true"] .card-detail { max-height:10000px; }
.detail-inner { padding:0 24px 24px; border-top:1px solid var(--border); }
.detail-tabs { display:flex; gap:16px; margin-top:16px; }
.detail-tab { padding:8px 0; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; border:none; border-bottom:2px solid transparent; transition:all .2s; background:none; font-family:'Noto Sans TC',sans-serif; }
.detail-tab.active { color:var(--text); border-bottom-color:var(--text); }
.tab-content { display:none; padding-top:20px; }
.tab-content.active { display:block; }

.section-group { margin-top:24px; }
.section-title { font-family:'Noto Serif TC',serif; font-size:14px; font-weight:700; margin-bottom:12px; border-left: 2px solid var(--text); padding-left: 8px; }
.checklist { list-style:none; }
.checklist li { padding:12px 0; border-bottom:1px solid var(--border); font-size:14px; display:flex; align-items:flex-start; gap:12px; }
.checklist li:last-child { border:none; }
.check-icon { width:18px; height:18px; border:1px solid var(--muted); border-radius:4px; display:flex; align-items:center; justify-content:center; flex-shrink:0; cursor:pointer; font-size:10px; color:transparent; margin-top:4px; transition:all .2s; }
.check-icon.checked { background:var(--text); border-color:var(--text); color:var(--bg); }

.question-item { padding:16px; margin-bottom:12px; background:var(--card); border-radius:8px; font-size:14px; display:flex; gap:12px; }
.q-label { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:1px; }

.curriculum-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:12px; margin-top:12px; }
.curr-year { background:var(--card); border-radius:8px; padding:16px; }
.curr-year-label { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700; margin-bottom:8px; letter-spacing:1px; color:var(--muted); }
.curr-item { font-size:12px; margin-bottom:4px; }

.analysis-box { margin-top:16px; padding:20px; background:var(--card); border-radius:8px; border-left: 2px solid var(--border); }
.analysis-box h4 { font-family:'Noto Serif TC',serif; font-size:14px; margin-bottom:12px; }
.analysis-box p, .analysis-box li { font-size:13px; line-height:1.8; color:var(--text); }
.analysis-box ul { list-style:none; margin-top:8px; }
.analysis-box li::before { content:'→ '; color:var(--muted); }

.info-note { font-size:13px; color:var(--muted); line-height:1.7; padding:16px; background:var(--card); border-radius:8px; margin-bottom:24px; border-left: 2px solid var(--border); }
.external-link { display:inline-block; margin-top:12px; font-size:12px; color:var(--text); text-decoration:none; border-bottom:1px solid var(--border); }

footer { text-align:center; padding:48px 0 32px; color:var(--muted); font-size:12px; border-top:1px solid var(--border); margin-top:64px; }

@media (max-width: 600px) {
  .curriculum-grid { grid-template-columns: 1fr; }
  .stat-num { font-size: 1.2rem; }
}

@media print {
  nav { display:none; }
  .container { padding-top:0; }
  .filter-bar { display:none; }
}
</style>
</head>

let progress = JSON.parse(localStorage.getItem('admission_progress') || '{}');

function stab(e,id,t){
  const c=document.querySelector(`.school-card[data-id="${id}"]`);
  c.querySelectorAll('.detail-tab').forEach(x=>x.classList.remove('active'));
  e.target.classList.add('active');
  c.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  c.querySelector(`[data-tab="${id}-${t}"]`).classList.add('active');
}

function tog(id){
  const c=document.querySelector(`.school-card[data-id="${id}"]`);
  const ex=c.dataset.expanded==='true';
  document.querySelectorAll('.school-card').forEach(x=>x.dataset.expanded='false');
  if(!ex)c.dataset.expanded='true';
}

function tck(el){
  const id=el.dataset.id;
  const type=el.dataset.type;
  const grp=el.dataset.grp || '0';
  const idx=el.dataset.idx;
  const key=`${id}-${type}-${grp}-${idx}`;
  
  if(progress[key]) delete progress[key];
  else progress[key]=true;
  
  localStorage.setItem('admission_progress', JSON.stringify(progress));
  updateUI();
}

function updateUI(){
  document.querySelectorAll('.check-icon').forEach(el=>{
    const id=el.dataset.id;
    const type=el.dataset.type;
    const grp=el.dataset.grp || '0';
    const idx=el.dataset.idx;
    const key=`${id}-${type}-${grp}-${idx}`;
    if(progress[key]) el.classList.add('checked');
    else el.classList.remove('checked');
  });
  
  let totalItems=0, doneItems=0;
  
  D.forEach(d=>{
    const items = document.querySelectorAll(`.check-icon[data-id="${d.id}"]`);
    const checked = document.querySelectorAll(`.check-icon.checked[data-id="${d.id}"]`);
    totalItems += items.length;
    doneItems += checked.length;
    
    const bar = document.getElementById(`bar-${d.id}`);
    const txt = document.getElementById(`txt-${d.id}`);
    const pct = items.length ? Math.round(checked.length/items.length*100) : 0;
    if(bar) bar.style.width = pct+'%';
    if(txt) txt.textContent = `${checked.length}/${items.length}`;
  });
  
  document.getElementById('totalSchools').textContent = D.length;
  document.getElementById('totalItems').textContent = totalItems;
  document.getElementById('totalDone').textContent = doneItems;
  document.getElementById('totalPct').textContent = (totalItems ? Math.round(doneItems/totalItems*100) : 0) + '%';
}

function clearProgress(){
  if(confirm('確定要清除所有進度紀錄嗎？')){
    progress={};
    localStorage.removeItem('admission_progress');
    updateUI();
  }
}

document.querySelectorAll('.filter-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render(b.dataset.filter);
  })
});

render('all');
</script>
